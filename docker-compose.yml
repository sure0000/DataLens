version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: datalens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  fuseki:
    image: ${FUSEKI_IMAGE:-stain/jena-fuseki:4.10.0}
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      FUSEKI_DATASET_1: ${FUSEKI_DATASET:-datalens}
    volumes:
      - ./.run/fuseki-data:/fuseki
    command: ["--update=true", "/${FUSEKI_DATASET:-datalens}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3030/\\$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FUSEKI_URL=http://fuseki:3030
    depends_on:
      - postgres
      - fuseki

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
